version: '3.8'

services:
  # MongoDB Database Container
  mongodb:
    image: mongo:latest
    container_name: localrank_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - localrank_network

  # Redis Cache & Queue Broker
  redis:
    image: redis:alpine
    container_name: localrank_redis
    ports:
      - "6379:6379"
    networks:
      - localrank_network

  # Backend REST API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: localrank_backend
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/localrankpro
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=super_secret_localrank_pro_key_12345
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - redis
    networks:
      - localrank_network

  # Frontend Nginx static host
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: localrank_frontend
    depends_on:
      - backend
    networks:
      - localrank_network

  # Gateway Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: localrank_gateway
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - localrank_network

volumes:
  mongo_data:

networks:
  localrank_network:
    driver: bridge
